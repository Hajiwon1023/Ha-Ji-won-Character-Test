<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ha Ji-won Character Test · 你和河智苑演过的哪个角色最像？</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ─── RESET & BASE ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sky: #2A89C8;
  --sky-dark: #1A6699;
  --sky-deep: #0D4F82;
  --sky-light: #E8F4FC;
  --sky-pale: #F0F8FF;
  --sky-mid: #B8D9F0;
  --sky-glow: rgba(42,137,200,0.15);
  --green: #2E7D32;
  --green-light: #E8F5E9;
  --green-mid: #66BB6A;
  --gold: #C9A84C;
  --ink: #1A2B3C;
  --ink-soft: #3D5166;
  --ink-muted: #7A90A4;
  --white: #FFFFFF;
  --surface: #FAFCFF;
  --border: rgba(42,137,200,0.2);
  --shadow-sm: 0 2px 12px rgba(26,102,153,0.08);
  --shadow-md: 0 8px 32px rgba(26,102,153,0.12);
  --shadow-lg: 0 20px 60px rgba(26,102,153,0.18);
  --r: 16px;
  --r-sm: 10px;
  --r-pill: 100px;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--sky-pale);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── BG DECORATION ─── */
body::before {
  content: '';
  position: fixed;
  top: -20%;
  right: -10%;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(42,137,200,0.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -10%;
  left: -5%;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(42,137,200,0.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ─── LAYOUT ─── */
#app {
  position: relative;
  z-index: 1;
  max-width: 620px;
  margin: 0 auto;
  padding: 0 20px 60px;
}

.screen { display: none; }
.screen.active { display: block; }

/* ─── HOME SCREEN ─── */
.home-wrap {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 0;
}

.home-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--sky);
  background: var(--sky-light);
  border: 1px solid var(--sky-mid);
  padding: 5px 16px;
  border-radius: var(--r-pill);
  margin-bottom: 28px;
  font-family: 'Noto Sans SC', sans-serif;
}

.home-emblem {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--sky-light) 0%, #C8E6F7 100%);
  border: 2px solid var(--sky-mid);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 32px;
  font-size: 46px;
  box-shadow: 0 0 0 8px rgba(42,137,200,0.06), var(--shadow-md);
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.home-title {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(22px, 5vw, 28px);
  font-weight: 500;
  color: var(--ink);
  line-height: 1.5;
  margin-bottom: 8px;
}

.home-title-en {
  font-family: 'Playfair Display', serif;
  font-size: 13px;
  font-style: italic;
  color: var(--sky);
  letter-spacing: 0.06em;
  margin-bottom: 20px;
}

.home-desc {
  font-size: 14px;
  color: var(--ink-muted);
  line-height: 1.85;
  max-width: 400px;
  margin: 0 auto 36px;
}

.home-meta {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 36px;
}

.meta-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.meta-num {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--sky);
}

.meta-label {
  font-size: 11px;
  color: var(--ink-muted);
  letter-spacing: 0.05em;
}

.meta-sep {
  width: 1px;
  height: 30px;
  background: var(--border);
}

.start-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--sky) 0%, var(--sky-dark) 100%);
  color: var(--white);
  border: none;
  border-radius: var(--r-pill);
  padding: 14px 44px;
  font-size: 15px;
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 500;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(42,137,200,0.35);
  transition: all 0.25s ease;
  letter-spacing: 0.02em;
}

.start-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 32px rgba(42,137,200,0.45);
}

.start-btn:active { transform: translateY(0); }

.start-btn svg { width: 16px; height: 16px; }

/* ─── QUIZ SCREEN ─── */
.quiz-header {
  padding: 28px 0 20px;
  position: sticky;
  top: 0;
  background: var(--sky-pale);
  z-index: 10;
}

.quiz-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.quiz-counter {
  font-size: 12px;
  color: var(--ink-muted);
  letter-spacing: 0.05em;
}

.quiz-counter strong {
  color: var(--sky);
  font-family: 'Playfair Display', serif;
  font-size: 15px;
}

.quiz-label {
  font-size: 11px;
  color: var(--sky);
  background: var(--sky-light);
  padding: 3px 10px;
  border-radius: var(--r-pill);
  letter-spacing: 0.05em;
}

.progress-track {
  width: 100%;
  height: 3px;
  background: var(--sky-mid);
  border-radius: var(--r-pill);
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--sky), var(--sky-dark));
  border-radius: var(--r-pill);
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
}

.question-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 28px 24px 24px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}

.question-dim {
  font-size: 11px;
  color: var(--sky);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 10px;
  font-weight: 500;
}

.question-text {
  font-family: 'Noto Serif SC', serif;
  font-size: 17px;
  font-weight: 400;
  color: var(--ink);
  line-height: 1.65;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}

.opt {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  cursor: pointer;
  font-size: 14px;
  color: var(--ink-soft);
  text-align: left;
  line-height: 1.55;
  transition: all 0.18s ease;
  box-shadow: var(--shadow-sm);
}

.opt:hover {
  border-color: var(--sky);
  background: var(--sky-light);
  color: var(--sky-dark);
  transform: translateX(3px);
}

.opt.selected {
  border-color: var(--green);
  background: var(--green-light);
  color: var(--green);
  border-width: 1.5px;
  transform: translateX(3px);
}

.opt-check {
  flex-shrink: 0;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.18s ease;
  background: var(--surface);
}

.opt.selected .opt-check {
  background: var(--green);
  border-color: var(--green);
}

.opt-check-icon {
  opacity: 0;
  transform: scale(0);
  transition: all 0.18s ease;
}

.opt.selected .opt-check-icon {
  opacity: 1;
  transform: scale(1);
}

.opt-letter {
  flex-shrink: 0;
  width: 24px;
  height: 24px;
  border-radius: 6px;
  background: var(--sky-light);
  color: var(--sky);
  font-size: 11px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  letter-spacing: 0;
  transition: all 0.18s ease;
}

.opt.selected .opt-letter {
  background: rgba(46,125,50,0.12);
  color: var(--green);
}

.btn-row {
  display: flex;
  gap: 10px;
}

.prev-btn {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 13px 20px;
  background: var(--white);
  color: var(--ink-muted);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  font-size: 13px;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer;
  transition: all 0.18s;
}

.prev-btn:hover {
  background: var(--sky-light);
  color: var(--sky-dark);
  border-color: var(--sky);
}

.next-btn {
  flex: 1;
  padding: 13px;
  background: linear-gradient(135deg, var(--sky) 0%, var(--sky-dark) 100%);
  color: var(--white);
  border: none;
  border-radius: var(--r-sm);
  font-size: 14px;
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 500;
  cursor: pointer;
  opacity: 0.35;
  pointer-events: none;
  transition: all 0.2s;
  letter-spacing: 0.02em;
}

.next-btn.enabled {
  opacity: 1;
  pointer-events: auto;
  box-shadow: 0 4px 16px rgba(42,137,200,0.3);
}

.next-btn.enabled:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 22px rgba(42,137,200,0.4);
}

/* ─── RESULT SCREEN ─── */
.result-wrap {
  padding: 28px 0 20px;
}

.result-header {
  text-align: center;
  margin-bottom: 28px;
}

.result-eyebrow {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--sky);
  margin-bottom: 8px;
}

.result-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 20px;
  font-weight: 400;
  color: var(--ink);
}

/* TOP RESULT */
.top-card {
  background: linear-gradient(135deg, var(--white) 0%, var(--sky-light) 100%);
  border: 1.5px solid var(--sky-mid);
  border-radius: var(--r);
  padding: 28px 24px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-md);
  position: relative;
  overflow: hidden;
}

.top-card::before {
  content: '#1';
  position: absolute;
  top: -10px;
  right: 16px;
  font-family: 'Playfair Display', serif;
  font-size: 72px;
  font-weight: 600;
  color: rgba(42,137,200,0.06);
  line-height: 1;
  pointer-events: none;
}

.top-tag {
  display: inline-block;
  font-size: 11px;
  color: var(--sky-dark);
  background: rgba(42,137,200,0.12);
  border: 1px solid rgba(42,137,200,0.25);
  padding: 4px 14px;
  border-radius: var(--r-pill);
  margin-bottom: 12px;
  letter-spacing: 0.05em;
}

.top-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 26px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 4px;
}

.top-drama {
  font-size: 13px;
  color: var(--ink-muted);
  margin-bottom: 6px;
}

.top-mbti-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  color: var(--sky);
  background: var(--sky-light);
  border: 1px solid var(--sky-mid);
  padding: 3px 10px;
  border-radius: 6px;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
}

.top-desc {
  font-size: 14px;
  color: var(--ink-soft);
  line-height: 1.8;
  margin-bottom: 16px;
}

.trait-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 18px;
}

.trait {
  font-size: 12px;
  color: var(--sky-dark);
  background: rgba(42,137,200,0.08);
  border: 1px solid rgba(42,137,200,0.2);
  padding: 4px 12px;
  border-radius: var(--r-pill);
}

.match-label {
  font-size: 12px;
  color: var(--ink-muted);
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
}

.match-label span {
  font-weight: 500;
  color: var(--sky-dark);
}

.match-bar-track {
  height: 6px;
  background: var(--sky-mid);
  border-radius: var(--r-pill);
  overflow: hidden;
}

.match-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--sky) 0%, var(--sky-dark) 100%);
  border-radius: var(--r-pill);
  transition: width 1.2s cubic-bezier(0.4,0,0.2,1) 0.3s;
}

/* RUNNER UP CARDS */
.runner-title {
  font-size: 12px;
  color: var(--ink-muted);
  letter-spacing: 0.06em;
  text-align: center;
  margin: 20px 0 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.runner-title::before, .runner-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.runner-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}

.runner-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 16px;
  box-shadow: var(--shadow-sm);
  position: relative;
}

.runner-rank {
  font-family: 'Playfair Display', serif;
  font-size: 11px;
  color: var(--ink-muted);
  margin-bottom: 6px;
}

.runner-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 2px;
}

.runner-drama {
  font-size: 11px;
  color: var(--ink-muted);
  margin-bottom: 8px;
}

.runner-tag {
  font-size: 11px;
  color: var(--sky);
  background: var(--sky-light);
  padding: 2px 8px;
  border-radius: var(--r-pill);
  display: inline-block;
  margin-bottom: 10px;
}

.runner-bar-track {
  height: 4px;
  background: var(--sky-light);
  border-radius: var(--r-pill);
  overflow: hidden;
}

.runner-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--sky-mid), var(--sky));
  border-radius: var(--r-pill);
  transition: width 1.2s cubic-bezier(0.4,0,0.2,1) 0.5s;
}

.runner-pct {
  font-size: 11px;
  color: var(--ink-muted);
  margin-top: 4px;
}

/* CLOSING */
.result-quote {
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--ink-muted);
  margin-bottom: 20px;
  line-height: 1.7;
}

.retry-btn {
  width: 100%;
  padding: 13px;
  background: transparent;
  color: var(--sky);
  border: 1.5px solid var(--sky);
  border-radius: var(--r-sm);
  font-size: 14px;
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.02em;
}

.retry-btn:hover {
  background: var(--sky-light);
}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.screen.active .question-card,
.screen.active .options,
.screen.active .btn-row {
  animation: fadeUp 0.3s ease both;
}

.screen.active .top-card { animation: fadeUp 0.4s ease 0.1s both; }
.screen.active .runner-cards { animation: fadeUp 0.4s ease 0.2s both; }

/* ─── RESPONSIVE ─── */
@media (max-width: 480px) {
  .runner-cards { grid-template-columns: 1fr; }
  .home-title { font-size: 20px; }
  .question-text { font-size: 15px; }
  .top-name { font-size: 22px; }
}
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="home" class="screen active">
    <div class="home-wrap">
      <div class="home-badge">Ha Ji-won Character Test</div>
      <div class="home-emblem">🌊</div>
      <h1 class="home-title">你和河智苑演过的<br>哪个角色最像？</h1>
      <div class="home-title-en">Ha Ji-won Character Test</div>
      <p class="home-desc">她是韩国最会变脸的演员，用 15 个截然不同的角色书写了一部女性图鉴。18 道题，找到你的专属角色。</p>
      <div class="home-meta">
        <div class="meta-item">
          <div class="meta-num">18</div>
          <div class="meta-label">道题目</div>
        </div>
        <div class="meta-sep"></div>
        <div class="meta-item">
          <div class="meta-num">15</div>
          <div class="meta-label">个角色</div>
        </div>
        <div class="meta-sep"></div>
        <div class="meta-item">
          <div class="meta-num">Top3</div>
          <div class="meta-label">匹配结果</div>
        </div>
      </div>
      <button class="start-btn" onclick="startTest()">
        开始测试
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 8h10M9 4l4 4-4 4"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="screen">
    <div class="quiz-header">
      <div class="quiz-top">
        <div class="quiz-counter">第 <strong id="qcur">1</strong> 题 / 18</div>
        <div class="quiz-label" id="qdim"></div>
      </div>
      <div class="progress-track"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    </div>
    <div class="question-card">
      <div class="question-text" id="qtext"></div>
    </div>
    <div class="options" id="opts"></div>
    <div class="btn-row">
      <button class="prev-btn" id="prevbtn" onclick="prevQ()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M9 2L4 7l5 5"/>
        </svg>
        上一题
      </button>
      <button class="next-btn" id="nextbtn" onclick="nextQ()">下一题</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result" class="screen">
    <div class="result-wrap">
      <div class="result-header">
        <div class="result-eyebrow">Your Character Match</div>
        <div class="result-title">你最像河智苑的——</div>
      </div>
      <div class="top-card" id="top-card"></div>
      <div class="runner-title">还有这两位也与你相近</div>
      <div class="runner-cards" id="runner-cards"></div>
      <div class="result-quote">"千人千面，每一面都值得被认真书写。"</div>
      <button class="retry-btn" onclick="retry()">↺ 重新测试</button>
    </div>
  </div>

</div><!-- #app -->

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const ROLES = [
  // ENTJ
  { id:'ENTJ', name:'秋尚雅', drama:'《Climax》', tag:'野心战略型',
    desc:'你眼神凌厉、气场强大，面对绝境能迅速理清利弊。你有极强的掌控欲和战略眼光，是那种让人又敬又怕的存在——就像秋尚雅，野心与手腕并存，绝不甘心屈居人下。',
    traits:['大局掌控','野心勃勃','决策果断','强势高效'] },
  // ISTP
  { id:'ISTP', name:'吉罗琳', drama:'《秘密花园》', tag:'独立行动型',
    desc:'你是行动派，外冷内热，务实且崇尚独立。不喜欢废话，用行动说话。就像吉罗琳，帅气利落，看似冷漠，内心却藏着真实细腻的情感。',
    traits:['独立自强','行动力强','外冷内热','务实冷静'] },
  // INTJ

// ─── MBTI → ROLE mapping ──────────────────────────────────────────────────
// scores: [E,I,S,N,T,F,J,P] index 0-7
function getMbti(sc) {
  const EI = sc[0] >= sc[1] ? 'E' : 'I';
  const SN = sc[2] >= sc[3] ? 'S' : 'N';
  const TF = sc[4] >= sc[5] ? 'T' : 'F';
  const JP = sc[6] >= sc[7] ? 'J' : 'P';
  return EI+SN+TF+JP;
}

const MBTI_MAP = {
  'ENTJ':'ENTJ','ENTP':'ENFP2','ENFJ':'ENFJ','ENFP':'ENFP',
  'ESTJ':'ESTJ','ESTP':'ESTP','ESFJ':'ESFJ','ESFP':'ESFJ',
  'INTJ':'INTJ','INTP':'ISTP','INFJ':'INFJ','INFP':'INFP',
  'ISTJ':'ISTJ','ISTP':'ISTP','ISFJ':'ISFJ','ISFP':'ISFP',
};

function getRoleById(id) { return ROLES.find(r=>r.id===id); }

// ─── SCORING: compute top 3 by MBTI closeness ────────────────────────────
function computeTop3(sc) {
  const myMbti = getMbti(sc);
  const myLetters = myMbti.split('');

  // For every role, compute match score (0-4 letters matching)
  const scored = ROLES.map(role => {
    const rid = role.id.replace('2',''); // strip numeric suffix for mapping
    const roleLetters = role.id.replace(/\d/g,'').split('');
    let match = 0;
    for (let i=0; i<4; i++) {
      if (myLetters[i] === roleLetters[i]) match++;
    }
    return { role, match };
  });

  // Sort: exact MBTI match first, then by letter overlap, randomize ties
  scored.sort((a,b) => b.match - a.match + (Math.random()-0.5)*0.1);

  // Ensure no two same MBTI id in top 3
  const seen = new Set();
  const top3 = [];
  for (const item of scored) {
    const key = item.role.id.replace(/\d/,'');
    if (!seen.has(key)) {
      seen.add(key);
      top3.push(item);
    }
    if (top3.length===3) break;
  }

  // Compute % (4 letters = 100%, 3=85%, 2=65%, 1=45%, 0=30%)
  const pcts = [100, 85, 65, 45, 30];
  return top3.map((item,i) => ({
    role: item.role,
    pct: pcts[item.match] - i * (i===0?0:2)
  }));
}

// ─── STATE ────────────────────────────────────────────────────────────────
let cur = 0;
let answers = new Array(QS.length).fill(null); // 0 or 1

function startTest() {
  cur = 0;
  answers = new Array(QS.length).fill(null);
  showScreen('quiz');
  renderQ();
}

function renderQ() {
  const q = QS[cur];
  const pct = (cur / QS.length) * 100;
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('qcur').textContent = cur + 1;
  document.getElementById('qdim').textContent = DIMS[q.dim];
  document.getElementById('qtext').textContent = q.q;

  const letters = ['A','B'];
  const box = document.getElementById('opts');
  box.innerHTML = '';
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt' + (answers[cur] === i ? ' selected' : '');
    btn.innerHTML = `
      <span class="opt-letter">${letters[i]}</span>
      <span style="flex:1">${o.t}</span>
      <span class="opt-check">
        <svg class="opt-check-icon" width="11" height="11" viewBox="0 0 11 11" fill="none">
          <path d="M1.5 5.5L4.5 8.5L9.5 2.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>`;
    btn.onclick = () => selectOpt(i);
    box.appendChild(btn);
  });

  const nb = document.getElementById('nextbtn');
  nb.textContent = cur < QS.length - 1 ? '下一题' : '查看结果';
  answers[cur] !== null ? nb.classList.add('enabled') : nb.classList.remove('enabled');
  document.getElementById('prevbtn').style.visibility = cur === 0 ? 'hidden' : 'visible';
}

function selectOpt(i) {
  answers[cur] = i;
  document.querySelectorAll('.opt').forEach((b, idx) => b.classList.toggle('selected', idx === i));
  document.getElementById('nextbtn').classList.add('enabled');
}

function nextQ() {
  if (answers[cur] === null) return;
  cur++;
  if (cur < QS.length) { renderQ(); return; }
  showResult();
}

function prevQ() {
  if (cur === 0) return;
  cur--;
  renderQ();
}

function showResult() {
  // Tally scores [E,I,S,N,T,F,J,P]
  const sc = [0,0,0,0,0,0,0,0];
  answers.forEach((a, qi) => {
    if (a !== null) {
      QS[qi].opts[a].s.forEach((v, si) => sc[si] += v);
    }
  });

  const top3 = computeTop3(sc);

  // Render top card
  const top = top3[0];
  const topEl = document.getElementById('top-card');
  topEl.innerHTML = `
    <div class="top-tag">${top.role.tag}</div>
    <div class="top-name">${top.role.name}</div>
    <div class="top-drama">${top.role.drama}</div>
    <div class="top-desc">${top.role.desc}</div>
    <div class="trait-row">${top.role.traits.map(t=>`<span class="trait">${t}</span>`).join('')}</div>
    <div class="match-label">匹配度 <span>${top.pct}%</span></div>
    <div class="match-bar-track"><div class="match-bar-fill" style="width:0%" data-w="${top.pct}%"></div></div>
  `;

  // Render runners
  const runEl = document.getElementById('runner-cards');
  runEl.innerHTML = top3.slice(1).map((item, i) => `
    <div class="runner-card">
      <div class="runner-rank">#${i+2} 匹配</div>
      <div class="runner-name">${item.role.name}</div>
      <div class="runner-drama">${item.role.drama}</div>
      <div class="runner-tag">${item.role.tag}</div>
      <div class="runner-bar-track"><div class="runner-bar-fill" style="width:0%" data-w="${item.pct}%"></div></div>
      <div class="runner-pct">${item.pct}% 匹配</div>
    </div>
  `).join('');

  showScreen('result');

  // Animate bars after paint
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.querySelectorAll('[data-w]').forEach(el => {
      el.style.width = el.dataset.w;
    });
  }));
}

function retry() {
  showScreen('home');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
